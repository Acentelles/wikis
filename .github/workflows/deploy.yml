name: Deploy wikis to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install mdbook and mdbook-katex
        run: cargo install --locked --version 0.4.43 mdbook && cargo install --locked --version 0.9.0 mdbook-katex

      - name: Build site
        run: |
          set -euxo pipefail
          mkdir -p site
          cp landing/index.html site/index.html
          mdbook build pq/book -d "$GITHUB_WORKSPACE/site/pq"
          mdbook build jolt-atlas/book -d "$GITHUB_WORKSPACE/site/jolt-atlas"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
